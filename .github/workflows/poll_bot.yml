name: Bot de Atención
on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: python bot.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_DUENO: ${{ secrets.TELEGRAM_CHAT_ID_DUENO }}
          CALLMEBOT_API_KEY: ${{ secrets.CALLMEBOT_API_KEY }}
          MI_NUMERO_WHATSAPP: ${{ secrets.MI_NUMERO_WHATSAPP }}
